---
openapi: 3.0.0
info:
  title: RFID Security Service
  description: Management of RFID media, permissions and associations.
  contact:
    email: Brian.Curnow@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: /api/v1.0
    description: Version 1.0.
tags:
  - name: authorized
  - name: config
  - name: guest
  - name: guest-media
  - name: media
  - name: media-perm
  - name: permission
  - name: reader
security:
  - ApiKey: []
paths:
  /authorized/{media_id}/{perm_name}:
    get:
      tags: [authorized]
      summary: Checks if media has a permission
      parameters:
        - name: media_id
          in: path
          required: true
          schema: { type: string, example: 80558ABA5C3504 }
        - name: perm_name
          in: path
          required: true
          schema: { type: string, example: Open Door }
      responses:
        '200':
          description: Media has the supplied permission.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaConfig' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { description: Media does not have the supplied permission }
  /configs:
    get:
      tags: [config]
      responses:
        '200':
          description: Array of Config objects.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Config' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [config]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Config' }
      responses:
        '201':
          description: New record created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Config' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '409': { description: Record already exists. }
  /configs/{key}:
    get:
      tags: [config]
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string, example: Admin User }
      responses:
        '200':
          description: Config object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Config' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Record not found. }
    delete:
      tags: [config]
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string, example: Admin User }
      responses:
        '200':
          description: Success
          headers:
            x-record-count:
              schema: { type: integer }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [config]
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string, example: Admin User }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string, example: admin }
      responses:
        '200':
          description: Updated
          headers:
            x-record-count: { schema: { type: integer } }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /guests:
    get:
      tags: [guest]
      responses:
        '200':
          description: Array of Guest objects.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Guest' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [guest]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GuestInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guest' }
        '409': { description: Conflict }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
  /guests/{id}:
    get:
      tags: [guest]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Guest object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guest' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found. }
    delete:
      tags: [guest]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Deleted
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [guest]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GuestInput' }
      responses:
        '200': { description: Updated }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /guest-media:
    get:
      tags: [guest-media]
      parameters:
        - name: guest_id
          in: query
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/GuestMedia' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [guest-media]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GuestMediaInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GuestMedia' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '409': { description: Conflict }
  /guest-media/{id}:
    get:
      tags: [guest-media]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GuestMedia' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
    delete:
      tags: [guest-media]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200': { description: Deleted }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [guest-media]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GuestMediaInput' }
      responses:
        '200': { description: Updated }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /media:
    get:
      tags: [media]
      parameters:
        - name: exclude_associated
          in: query
          schema: { type: boolean, example: true }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Media' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [media]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Media' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Media' }
        '409': { description: Conflict }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /media/{id}:
    get:
      tags: [media]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, example: 80558ABA5C3504 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Media' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
    delete:
      tags: [media]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, example: 80558ABA5C3504 }
      responses:
        '200': { description: Deleted }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [media]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, example: 80558ABA5C3504 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: MagicBand }
                desc: { type: string, nullable: true }
      responses:
        '200': { description: Updated }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /media-perms:
    get:
      tags: [media-perm]
      parameters:
        - name: media_id
          in: query
          schema: { type: string, example: 80558ABA5C3504 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MediaPerm' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [media-perm]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaPermInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaPerm' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '409': { description: Conflict }
        '404': { description: Not found }
  /media-perms/{id}:
    get:
      tags: [media-perm]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaPerm' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
    delete:
      tags: [media-perm]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200': { description: Deleted }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [media-perm]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaPermInput' }
      responses:
        '200': { description: Updated }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /permissions:
    get:
      tags: [permission]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Permission' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [permission]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Permission' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Permission' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '409': { description: Conflict }
  /permissions/{id}:
    get:
      tags: [permission]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Permission' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
    delete:
      tags: [permission]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200': { description: Deleted }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [permission]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: Open Door }
                desc: { type: string, nullable: true }
      responses:
        '200': { description: Updated }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /player/{name}:
    get:
      tags: [sound]
      security: []
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string, example: read.wav }
      responses:
        '200':
          description: Sound stream
          content:
            audio/wav:
              schema: { type: string, format: binary }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
  /reader:
    get:
      tags: [reader]
      parameters:
        - name: timeout
          in: query
          schema: { type: integer, format: int64, minimum: 0, maximum: 30, example: 20 }
      responses:
        '200':
          description: RFID
          content:
            application/json:
              schema: { type: string, example: 80558ABA5C3504 }
        '204': { description: No data read }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
  /sounds:
    get:
      tags: [sound]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Sound' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    post:
      tags: [sound]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, content]
              properties:
                name: { type: string, example: read.wav }
                content: { type: string, format: binary }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sound' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '409': { description: Conflict }
        '404': { description: Not found }
  /sounds/{id}:
    get:
      tags: [sound]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sound' }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { description: Not found }
    delete:
      tags: [sound]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      responses:
        '200': { description: Deleted }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
    put:
      tags: [sound]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, example: 1 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              # Only name is required for update, if content is unspecified, only the name will be updated
              required: [name]
              properties:
                name: { type: string, example: read.wav }
                content: { type: string, format: binary }
      responses:
        '200': { description: Updated }
        '201': { description: Created }
        '400': { description: Invalid request. }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
components:
  schemas:
    Color:
      required: [int, hex, html]
      type: object
      properties:
        int: { type: integer, example: 16777215 }
        hex: { type: string, example: FFFFFF, pattern: '^[A-F0-9]{6}$' }
        html: { type: string, example: '#ffffff', pattern: '^#[a-f0-9]{6}$' }
    Config:
      required: [key, value]
      type: object
      properties:
        key: { type: string, example: Admin User }
        value: { type: string, example: admin }
    Guest:
      required: [first_name, last_name]
      type: object
      properties:
        id: { type: integer, readOnly: true, example: 1 }
        first_name: { type: string, example: Mickey }
        last_name: { type: string, example: Mouse }
        sound: { $ref: '#/components/schemas/Sound', nullable: true }
        color: { $ref: '#/components/schemas/Color', nullable: true }
    GuestInput:
      required: [first_name, last_name, sound, color]
      type: object
      properties:
        first_name: { type: string, example: Mickey }
        last_name: { type: string, example: Mouse }
        sound: { type: integer, nullable: true }
        color: { type: integer, nullable: true }
    GuestMedia:
      required: [guest, media]
      type: object
      properties:
        id: { type: integer, readOnly: true, example: 1 }
        guest: { $ref: '#/components/schemas/Guest' }
        media: { $ref: '#/components/schemas/Media' }
        sound: { $ref: '#/components/schemas/Sound', nullable: true }
        color: { $ref: '#/components/schemas/Color', nullable: true }
    GuestMediaInput:
      required: [guest_id, media_id]
      type: object
      properties:
        guest_id: { type: integer, example: 1 }
        media_id: { type: string, example: 80558ABA5C3504 }
        sound: { type: integer, example: 1, nullable: true }
        color: { type: integer, example: 16777215, nullable: true }
    Media:
      required: [name]
      type: object
      properties:
        id: { type: string, example: 80558ABA5C3504 }
        name: { type: string, example: Anna's MagicBand }
        desc: { type: string, example: Elsa's gift, nullable: true }
    MediaPerm:
      required: [media, permission]
      type: object
      properties:
        id: { type: integer, readOnly: true, example: 1 }
        media: { $ref: '#/components/schemas/Media' }
        permission: { $ref: '#/components/schemas/Permission' }
    MediaPermInput:
      required: [media_id, permission_id]
      type: object
      properties:
        media_id: { type: string, example: 80558ABA5C3504 }
        permission_id: { type: integer, example: 1 }
    Permission:
      required: [name]
      type: object
      properties:
        id: { type: integer, readOnly: true, example: 1 }
        name: { type: string, example: Open Door }
        desc: { type: string, nullable: true }
    Sound:
      required: [name]
      type: object
      properties:
        id: { type: integer, readOnly: true, example: 1 }
        name: { type: string, example: read.wav }
        last_update_timestamp: { type: string, format: date-time, readOnly: true }
        content: { type: string, format: binary }
    MediaConfig:
      required: [media, permission]
      type: object
      properties:
        media: { $ref: '#/components/schemas/Media', readOnly: true }
        permission: { $ref: '#/components/schemas/Permission', readOnly: true }
        guest: { $ref: '#/components/schemas/Guest', nullable: true, readOnly: true }
        sound: { $ref: '#/components/schemas/Sound', nullable: true, readOnly: true }
        color: { $ref: '#/components/schemas/Color', nullable: true }
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-RFIDSECURITYSVC-API-KEY
      x-apikeyInfoFunc: rfidsecuritysvc.model.authorized.verify_api_key
  responses:
    UnauthorizedError:
      description: API key is missing or invalid
      headers:
        WWW_Authenticate:
          schema: { type: string }
